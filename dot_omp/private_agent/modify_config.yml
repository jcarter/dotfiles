{{- /* chezmoi:modify-template */ -}}
{{- $existing := .chezmoi.stdin | fromYaml -}}
{{- if not $existing -}}{{- $existing = fromYaml "{}" -}}{{- end -}}
{{- /* Desired state — this is the source of truth for all managed fields. */ -}}
{{- $desired := `
ask:
  timeout: 0
browser:
  headless: true
disabledExtensions: []
memories:
  enabled: true
theme:
  dark: dracula
  light: alucard
` | fromYaml -}}
{{- /* Blacklisted fields — preserved from the existing file unchanged.
       To exclude a new field, add its top-level key to this list. */ -}}
{{- range $key := list "modelRoles" -}}
{{- if hasKey $existing $key -}}
{{- $desired = $desired | setValueAtPath $key (index $existing $key) -}}
{{- end -}}
{{- end -}}
{{ $desired | toYaml -}}
