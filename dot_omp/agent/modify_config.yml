#!/usr/bin/env python3
"""chezmoi modify_ script: sets theme.dark and theme.light in ~/.omp/agent/config.yml.

chezmoi pipes the current file content to stdin and replaces the file with
whatever we write to stdout. We replace the entire `theme:` block so the
correct values are always in place after `chezmoi apply`, while leaving every
other key (modelRoles, memories, browser, etc.) untouched.

If the file does not yet exist chezmoi passes an empty string, and we emit a
minimal config containing only the theme block.
"""

import re
import sys

DARK_THEME = "dracula"
LIGHT_THEME = "alucard"

content = sys.stdin.read()

new_block = f"theme:\n  dark: {DARK_THEME}\n  light: {LIGHT_THEME}\n"

if re.search(r"^theme\s*:", content, re.MULTILINE):
    # Replace existing theme block: header line + all indented continuation lines.
    content = re.sub(
        r"^theme\s*:[ \t]*\n(?:[ \t]+[^\n]*\n)*",
        new_block,
        content,
        flags=re.MULTILINE,
    )
else:
    # Append to file (handles fresh-machine case where config.yml is empty).
    if content and not content.endswith("\n"):
        content += "\n"
    content += new_block

sys.stdout.write(content)
