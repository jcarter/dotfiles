#!/bin/sh
# chezmoi modify_ script: sets theme.dark and theme.light in ~/.omp/agent/config.yml.
#
# chezmoi pipes the current file content to stdin and replaces the file with
# whatever we write to stdout. We replace the entire `theme:` block so the
# correct values are always in place after `chezmoi apply`, while leaving every
# other key (modelRoles, memories, browser, etc.) untouched.
#
# If the file does not yet exist chezmoi passes an empty string, and we emit a
# minimal config containing only the theme block.

DARK_THEME="dracula"
LIGHT_THEME="alucard"

awk -v dark="$DARK_THEME" -v light="$LIGHT_THEME" '
/^theme[[:space:]]*:/ {
    found = 1
    in_theme = 1
    print "theme:"
    print "  dark: " dark
    print "  light: " light
    next
}
in_theme && /^[[:space:]]/ { next }
{ in_theme = 0; print }
END {
    if (!found) {
        print "theme:"
        print "  dark: " dark
        print "  light: " light
    }
}
'
